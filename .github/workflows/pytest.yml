name: Python Pytest CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install google-genai groq tiktoken docker python-dotenv rich fastapi pyTelegramBotAPI fpdf2 markdown ddgs trafilatura; fi

    - name: Run Tests with Pytest
      env:
        PYTHONPATH: .   
      run: |
        pytest tests/ -v --cov=. --cov-report=term-missing