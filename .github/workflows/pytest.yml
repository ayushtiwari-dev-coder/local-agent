name: Python Pytest CI

# This pipeline runs every time you push to the 'main' branch 
# or open a Pull Request against it.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Grab the code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up the Python environment (matching your local setup)
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: "pip" # Caches dependencies to make future runs faster

    # 3. Install dependencies
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install pytest and coverage tools
        pip install pytest pytest-cov
        
        # If you have a requirements.txt, install it. 
        # Otherwise, install the core packages your app imports.
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install google-genai groq tiktoken docker python-dotenv rich fastapi; fi

    # 4. Run the 74 Pytest tests!
    - name: Run Tests with Pytest
      run: |
        # Runs pytest and outputs a coverage report in the GitHub console
        pytest tests/ -v --cov=. --cov-report=term-missing